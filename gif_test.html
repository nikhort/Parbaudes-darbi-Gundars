<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GIF Test</title>
  <style>
    body{ background:#0b0e11; color:#e2e8f0; font-family:Arial; padding:20px }
    .box{ display:flex; gap:20px; align-items:center }
    .holder{ width:160px; height:160px; overflow:hidden; border-radius:12px; background:#0f1622; display:flex; align-items:center; justify-content:center }
    img{ width:100%; height:100%; object-fit:cover }
    button{ margin-top:16px }
  </style>
</head>
<body>
  <h2>GIF test — open this file in your browser</h2>
  <div class="box">
    <div>
      <div class="holder"><img id="m" src="images/morphling_profile.gif" alt="morph"></div>
      <div style="text-align:center">morphling_profile.gif</div>
    </div>
    <div>
      <div class="holder"><img id="s" src="images/sniper_profile.gif" alt="snip"></div>
      <div style="text-align:center">sniper_profile.gif</div>
    </div>
  </div>
  <button id="toggle">Toggle morphling visibility</button>
  <script>
    document.getElementById('toggle').addEventListener('click', ()=>{
      const el = document.getElementById('m');
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    })
  </script>
</body>
</html>
